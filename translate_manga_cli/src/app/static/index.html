<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>translate_manga_cli debug shell</title>
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body>
    <header class="topbar">
      <label class="importer">
        <input id="folderInput" type="file" webkitdirectory multiple hidden />
        <span>导入目录</span>
      </label>
      <button id="readTextBtn">读取文字</button>
      <button id="runPageBtn">整页翻译</button>
      <button id="redoInpaintBtn">重做擦字</button>
      <button id="redoRenderBtn">重做写字</button>
      <button id="showSourceBtn">原图</button>
      <button id="showTranslatedBtn">译图</button>
      <span id="statusText" class="status">等待导入页面</span>
    </header>
    <main class="layout">
      <aside class="sidebar">
        <div class="panel-title">页面列表</div>
        <div id="pageList" class="page-list"></div>
      </aside>
      <section class="viewer">
        <div id="stage" class="stage">
          <img id="pageImage" alt="当前页" />
          <canvas id="overlay"></canvas>
        </div>
      </section>
      <aside class="inspector">
        <div class="panel-title">OCR 结果</div>
        <div id="ocrResultList" class="ocr-result-list"></div>
        <div class="panel-title debug-title">当前气泡</div>
        <section id="bubbleEditorPanel" class="bubble-editor-panel"></section>
        <div class="panel-title debug-title">阶段耗时</div>
        <section id="timingPanel" class="timing-panel"></section>
        <div class="panel-title debug-title">调试数据</div>
        <pre id="debugPanel"></pre>
      </aside>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
